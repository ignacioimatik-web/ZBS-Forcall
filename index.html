
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión Salud Forcall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Librería para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              forcall: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              earth: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                500: '#a8a29e',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #fafaf9; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      
      .print-only { display: none !important; }

      @media print {
        .no-print, 
        header, 
        nav, 
        button, 
        .fixed, 
        .absolute,
        input,
        select,
        textarea,
        [role="dialog"] { 
          display: none !important; 
        }

        .print-only { 
          display: block !important; 
        }

        body { 
          background-color: white !important; 
          color: black !important; 
          margin: 0 !important; 
          padding: 0 !important;
          width: 100% !important;
        }

        /* Forzar que el calendario ocupe una sola hoja */
        #calendar-container {
          width: 100% !important;
          max-height: 190mm !important; /* Ajuste para A4 Landscape */
          padding: 0 !important;
          margin: 0 !important;
          overflow: hidden !important;
          page-break-inside: avoid !important;
        }

        /* Reducción de tamaños para impresión */
        .grid-cols-7 {
          gap: 2px !important;
        }

        .min-h-\[140px\], .md\:min-h-\[160px\] {
          min-height: 80px !important; /* Reducir altura para que quepan 6 filas */
        }

        .text-lg { font-size: 1rem !important; }
        .text-\[9px\] { font-size: 8px !important; }

        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        @page {
          size: A4 landscape;
          margin: 5mm;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "otpauth": "https://esm.sh/otpauth@9.2.2",
    "leaflet": "https://esm.sh/leaflet@1.9.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
</head>

    <div id="root"></div>
  </body>
</html>
