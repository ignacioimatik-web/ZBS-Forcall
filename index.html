
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="2.0.1" />
    <title>Gestión Salud Forcall</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Librería para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha384-Yv5O+t3uE3hunW8uyrbpPW3iw6/5/Y7HitWJBLgqfMoA36NogMmy+8wWZMpn3HWc" crossorigin="anonymous"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              '3xl': '1920px',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              forcall: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              earth: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                500: '#a8a29e',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              }
            }
          }
        },
        safelist: [
          'bg-blue-100', 'bg-red-100', 'bg-green-100', 'bg-orange-100', 'bg-sky-100',
          'text-blue-900', 'text-red-900', 'text-green-900', 'text-orange-900', 'text-sky-900',
          'border-blue-300', 'border-red-300', 'border-green-300', 'border-orange-300', 'border-sky-300',
          'ring-orange-400'
        ]
      }
    </script>
    <style>
      body { background-color: #fafaf9; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

      .print-only { display: none !important; }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }

      @keyframes wave-in {
        0%   { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(4px); }
        60%  { opacity: 1; filter: blur(0); }
        100% { transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-wave-in {
        animation: wave-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes wave-child {
        0%   { opacity: 0; transform: translateY(20px) scale(0.97); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-stagger > * {
        animation: wave-child 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .animate-stagger > *:nth-child(1)  { animation-delay: 0.00s; }
      .animate-stagger > *:nth-child(2)  { animation-delay: 0.06s; }
      .animate-stagger > *:nth-child(3)  { animation-delay: 0.12s; }
      .animate-stagger > *:nth-child(4)  { animation-delay: 0.18s; }
      .animate-stagger > *:nth-child(5)  { animation-delay: 0.24s; }
      .animate-stagger > *:nth-child(6)  { animation-delay: 0.30s; }
      .animate-stagger > *:nth-child(7)  { animation-delay: 0.36s; }
      .animate-stagger > *:nth-child(8)  { animation-delay: 0.42s; }
      .animate-stagger > *:nth-child(9)  { animation-delay: 0.48s; }
      .animate-stagger > *:nth-child(10) { animation-delay: 0.54s; }
      .animate-stagger > *:nth-child(11) { animation-delay: 0.60s; }
      .animate-stagger > *:nth-child(12) { animation-delay: 0.66s; }
      .animate-stagger > *:nth-child(13) { animation-delay: 0.72s; }
      .animate-stagger > *:nth-child(14) { animation-delay: 0.78s; }
      .animate-stagger > *:nth-child(15) { animation-delay: 0.84s; }

      @keyframes slide-in-left {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slide-in-left 0.25s ease-out forwards;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ── Background transition effects ── */
      @keyframes eff-gradient {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes eff-blob1 {
        0%   { transform: translate(0,0) scale(1); }
        33%  { transform: translate(6%,-4%) scale(1.08); }
        66%  { transform: translate(-4%,3%) scale(0.92); }
        100% { transform: translate(0,0) scale(1); }
      }
      @keyframes eff-blob2 {
        0%   { transform: translate(0,0) scale(1); }
        33%  { transform: translate(-5%,4%) scale(1.05); }
        66%  { transform: translate(5%,-6%) scale(0.95); }
        100% { transform: translate(0,0) scale(1); }
      }
      @keyframes eff-ring {
        0%   { transform: scale(1); opacity: 0.15; }
        50%  { transform: scale(1.25); opacity: 0.04; }
        100% { transform: scale(1); opacity: 0.15; }
      }
      @keyframes eff-ring2 {
        0%   { transform: scale(1); opacity: 0.1; }
        50%  { transform: scale(1.15); opacity: 0.02; }
        100% { transform: scale(1); opacity: 0.1; }
      }
      @keyframes eff-particle {
        0%   { transform: translateY(0) translateX(0); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(-110vh) translateX(15vw); opacity: 0; }
      }
      @keyframes eff-particle2 {
        0%   { transform: translateY(0) translateX(0); opacity: 0; }
        10%  { opacity: 0.5; }
        90%  { opacity: 0.5; }
        100% { transform: translateY(-110vh) translateX(-10vw); opacity: 0; }
      }
      @keyframes eff-glow {
        0%   { opacity: 0.08; transform: scale(1); }
        50%  { opacity: 0.18; transform: scale(1.05); }
        100% { opacity: 0.08; transform: scale(1); }
      }
      @keyframes eff-aurora {
        0%   { background-position: 0% 50%; transform: rotate(0deg) scale(1); }
        33%  { background-position: 100% 0%; transform: rotate(2deg) scale(1.02); }
        66%  { background-position: 50% 100%; transform: rotate(-1deg) scale(0.98); }
        100% { background-position: 0% 50%; transform: rotate(0deg) scale(1); }
      }
      @keyframes eff-shimmer {
        0%   { background-position: -200% 50%; }
        100% { background-position: 200% 50%; }
      }

      .eff-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        transition: opacity 0.6s;
      }

      .eff-content {
        position: relative;
        z-index: 1;
      }

      /* ── Gradient ── */
      .eff-gradient .eff-bg {
        background: linear-gradient(135deg, var(--ec1), var(--ec2), var(--ec3));
        background-size: 400% 400%;
        animation: eff-gradient 20s ease infinite;
        opacity: 0.12;
      }
      .eff-gradient .eff-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(225deg, var(--ec3), var(--ec1));
        background-size: 300% 300%;
        animation: eff-gradient 30s ease infinite reverse;
        opacity: 0.5;
      }

      /* ── Blobs ── */
      .eff-blobs .eff-bg > div {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        transition: opacity 0.6s;
      }
      .eff-blobs .eff-bg > div:nth-child(1) {
        width: 55%; height: 55%; top: -15%; left: -10%;
        background: var(--ec1);
        animation: eff-blob1 18s ease-in-out infinite;
      }
      .eff-blobs .eff-bg > div:nth-child(2) {
        width: 45%; height: 45%; bottom: -10%; right: -10%;
        background: var(--ec2);
        animation: eff-blob2 22s ease-in-out infinite;
      }
      .eff-blobs .eff-bg > div:nth-child(3) {
        width: 35%; height: 35%; top: 35%; left: 30%;
        background: var(--ec3);
        animation: eff-blob1 15s ease-in-out infinite reverse;
      }

      /* ── Rings ── */
      .eff-rings .eff-bg > div {
        position: absolute;
        border-radius: 50%;
        border: 2px solid;
        transition: all 0.6s;
      }
      .eff-rings .eff-bg > div:nth-child(1) {
        width: 75%; height: 75%; top: 12.5%; left: 12.5%;
        border-color: var(--ec1);
        animation: eff-ring 8s ease-in-out infinite;
      }
      .eff-rings .eff-bg > div:nth-child(2) {
        width: 55%; height: 55%; top: 22.5%; left: 22.5%;
        border-color: var(--ec2);
        animation: eff-ring2 6s ease-in-out infinite reverse;
      }
      .eff-rings .eff-bg > div:nth-child(3) {
        width: 90%; height: 90%; top: 5%; left: 5%;
        border-color: var(--ec3);
        animation: eff-ring 10s ease-in-out infinite 2s;
      }

      /* ── Particles ── */
      .eff-particles .eff-bg > div {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .eff-particles .eff-bg > div:nth-child(1) {
        width: 6px; height: 6px; bottom: -5%; left: 15%;
        background: var(--ec1);
        animation: eff-particle 14s ease-in-out infinite;
      }
      .eff-particles .eff-bg > div:nth-child(2) {
        width: 4px; height: 4px; bottom: -5%; left: 40%;
        background: var(--ec2);
        animation: eff-particle2 18s ease-in-out infinite 3s;
      }
      .eff-particles .eff-bg > div:nth-child(3) {
        width: 8px; height: 8px; bottom: -5%; left: 65%;
        background: var(--ec3);
        animation: eff-particle 16s ease-in-out infinite 5s;
      }
      .eff-particles .eff-bg > div:nth-child(4) {
        width: 5px; height: 5px; bottom: -5%; left: 85%;
        background: var(--ec1);
        animation: eff-particle2 20s ease-in-out infinite 2s;
      }
      .eff-particles .eff-bg > div:nth-child(5) {
        width: 7px; height: 7px; bottom: -5%; left: 50%;
        background: var(--ec3);
        animation: eff-particle 12s ease-in-out infinite 7s;
      }

      /* ── Glow ── */
      .eff-glow .eff-bg {
        background: radial-gradient(circle at 50% 50%, var(--ec1) 0%, transparent 60%);
      }
      .eff-glow .eff-bg::after {
        content: '';
        position: absolute;
        inset: -20%;
        background: radial-gradient(circle at 50% 50%, var(--ec2) 0%, transparent 50%);
        animation: eff-glow 6s ease-in-out infinite;
        opacity: 0.5;
      }

      /* ── Aurora ── */
      .eff-aurora .eff-bg {
        background: linear-gradient(135deg, var(--ec1), var(--ec2), var(--ec3), var(--ec1));
        background-size: 600% 600%;
        animation: eff-aurora 25s ease-in-out infinite;
        opacity: 0.1;
      }
      .eff-aurora .eff-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(45deg, transparent 30%, var(--ec2) 50%, transparent 70%);
        background-size: 200% 200%;
        animation: eff-shimmer 8s ease-in-out infinite;
        opacity: 0.15;
      }

      /* ── Shimmer ── */
      .eff-shimmer .eff-bg {
        background: linear-gradient(135deg, var(--ec1), var(--ec2), var(--ec3), var(--ec2), var(--ec1));
        background-size: 200% 100%;
        animation: eff-shimmer 4s ease-in-out infinite;
        opacity: 0.12;
      }
      .eff-shimmer .eff-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
        background-size: 200% 100%;
        animation: eff-shimmer 3s ease-in-out infinite reverse;
      }

      /* ── Fire ── */
      @keyframes eff-fire {
        0%   { transform: translateY(0) scaleY(1); }
        50%  { transform: translateY(-4%) scaleY(1.06); }
        100% { transform: translateY(0) scaleY(1); }
      }
      @keyframes eff-fire2 {
        0%   { transform: translateY(0) scale(1); opacity: 0.3; }
        50%  { transform: translateY(-6%) scale(1.03); opacity: 0.5; }
        100% { transform: translateY(0) scale(1); opacity: 0.3; }
      }
      .eff-fire .eff-bg {
        background: linear-gradient(0deg, var(--ec1) 0%, var(--ec2) 40%, transparent 70%);
        opacity: 0.2;
      }
      .eff-fire .eff-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 100%, var(--ec3) 0%, transparent 60%);
        animation: eff-fire 4s ease-in-out infinite;
      }
      .eff-fire .eff-bg > div:nth-child(1) {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 30% 100%, var(--ec2) 0%, transparent 45%);
        animation: eff-fire2 3.5s ease-in-out infinite;
      }
      .eff-fire .eff-bg > div:nth-child(2) {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 70% 100%, var(--ec1) 0%, transparent 40%);
        animation: eff-fire2 4.5s ease-in-out infinite 1s;
      }

      /* ── Rain ── */
      @keyframes eff-rain {
        0%   { background-position: 0% -200%; }
        100% { background-position: 0% 200%; }
      }
      .eff-rain .eff-bg {
        background: linear-gradient(180deg, var(--ec3), var(--ec2), var(--ec1));
        opacity: 0.12;
      }
      .eff-rain .eff-bg::after {
        content: '';
        position: absolute;
        inset: -100% 0;
        height: 300%;
        background: repeating-linear-gradient(10deg, transparent 0px, transparent 3px, rgba(255,255,255,0.12) 3px, rgba(255,255,255,0.12) 4px);
        animation: eff-rain 1s linear infinite;
      }
      .eff-rain .eff-bg > div:nth-child(1) {
        position: absolute;
        inset: -100% 0;
        height: 300%;
        background: repeating-linear-gradient(-8deg, transparent 0px, transparent 4px, rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 5px);
        animation: eff-rain 1.3s linear infinite 0.3s;
      }
      .eff-rain .eff-bg > div:nth-child(2) {
        position: absolute;
        inset: -100% 0;
        height: 300%;
        background: repeating-linear-gradient(20deg, transparent 0px, transparent 2px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 3px);
        animation: eff-rain 0.8s linear infinite 0.5s;
      }

      /* ── Waves ── */
      @keyframes eff-wave {
        0%   { transform: translateX(-25%) skewY(0deg); }
        50%  { transform: translateX(-5%) skewY(0.5deg); }
        100% { transform: translateX(-25%) skewY(0deg); }
      }
      @keyframes eff-wave2 {
        0%   { transform: translateX(15%) skewY(0deg); }
        50%  { transform: translateX(-5%) skewY(-0.5deg); }
        100% { transform: translateX(15%) skewY(0deg); }
      }
      .eff-waves .eff-bg {
        background: linear-gradient(180deg, var(--ec1), var(--ec2));
        opacity: 0.16;
      }
      .eff-waves .eff-bg::after {
        content: '';
        position: absolute;
        width: 140%;
        height: 28%;
        bottom: 32%;
        left: -20%;
        background: var(--ec3);
        border-radius: 45%;
        animation: eff-wave 8s ease-in-out infinite;
        opacity: 0.18;
      }
      .eff-waves .eff-bg > div:nth-child(1) {
        position: absolute;
        width: 150%;
        height: 22%;
        bottom: 16%;
        left: -25%;
        background: var(--ec2);
        border-radius: 40%;
        animation: eff-wave2 10s ease-in-out infinite;
        opacity: 0.14;
      }
      .eff-waves .eff-bg > div:nth-child(2) {
        position: absolute;
        width: 130%;
        height: 18%;
        bottom: 4%;
        left: -15%;
        background: var(--ec1);
        border-radius: 40%;
        animation: eff-wave 7s ease-in-out infinite 2s;
        opacity: 0.18;
      }

      /* ── Pulse ── */
      @keyframes eff-pulse-ring {
        0%   { transform: scale(0); opacity: 0.5; }
        100% { transform: scale(3); opacity: 0; }
      }
      @keyframes eff-pulse-bg {
        0%   { background-size: 100% 100%; opacity: 0.14; }
        50%  { background-size: 160% 160%; opacity: 0.22; }
        100% { background-size: 100% 100%; opacity: 0.14; }
      }
      .eff-pulse .eff-bg {
        background: radial-gradient(circle at 50% 50%, var(--ec1), var(--ec3));
        animation: eff-pulse-bg 6s ease-in-out infinite;
      }
      .eff-pulse .eff-bg > div {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 28%;
        height: 28%;
        margin-left: -14%;
        margin-top: -14%;
        border-radius: 50%;
        border: 2px solid var(--ec2);
        pointer-events: none;
      }
      .eff-pulse .eff-bg > div:nth-child(1) {
        animation: eff-pulse-ring 3s ease-out infinite;
      }
      .eff-pulse .eff-bg > div:nth-child(2) {
        animation: eff-pulse-ring 3s ease-out infinite 1s;
      }
      .eff-pulse .eff-bg > div:nth-child(3) {
        animation: eff-pulse-ring 3s ease-out infinite 2s;
      }

      /* ── Intensity modifiers ── */
      body.eff-low .eff-bg,
      body.eff-low .eff-bg > div { opacity: 0.03 !important; }
      body.eff-low .eff-bg::after { opacity: 0.02 !important; }
      body.eff-medium .eff-bg,
      body.eff-medium .eff-bg > div { opacity: 0.16 !important; }
      body.eff-medium .eff-bg::after { opacity: 0.13 !important; }
      body.eff-high .eff-bg,
      body.eff-high .eff-bg > div { opacity: 0.3 !important; }
      body.eff-high .eff-bg::after { opacity: 0.26 !important; }

@media print {
         .no-print,
         header,
         nav,
         button,
         .fixed,
         .absolute,
         input,
         select,
         textarea,
         [role="dialog"],
         .print-hide {
           display: none !important;
         }

         .print-only {
           display: block !important;
         }

         /* Show events in calendar cells during print */
         #calendar-container button {
           display: flex !important;
         }

         body {
           background-color: white !important;
           color: black !important;
           margin: 0 !important;
           padding: 0 !important;
           width: 100% !important;
         }

         /* Forzar que el calendario ocupe una sola hoja */
         #calendar-container {
           width: 100% !important;
           max-height: 190mm !important; /* Ajuste para A4 Landscape */
           padding: 0 !important;
           margin: 0 !important;
           overflow: hidden !important;
           page-break-inside: avoid !important;
         }

         /* Reducción de tamaños para impresión */
         .grid-cols-7 {
           gap: 2px !important;
         }

         .min-h-\[140px\], .md\:min-h-\[160px\] {
           min-height: 80px !important; /* Reducir altura para que quepan 6 filas */
         }

         .text-lg { font-size: 1rem !important; }
         .text-\[9px\] { font-size: 8px !important; }

         /* Mejoras para tabla de lista al imprimir */
         table {
           width: 100% !important;
           font-size: 9px !important;
         }
         th, td {
           padding: 4px 6px !important;
           border-color: #ccc !important;
         }
         th {
           background-color: #eee !important;
           -webkit-print-color-adjust: exact;
           print-color-adjust: exact;
         }

         * {
           -webkit-print-color-adjust: exact !important;
           print-color-adjust: exact !important;
         }

         @page {
           size: A4 landscape;
           margin: 5mm;
         }
       }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
