
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="2.0.1" />
    <title>Gestión Salud Forcall</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Librería para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha384-Yv5O+t3uE3hunW8uyrbpPW3iw6/5/Y7HitWJBLgqfMoA36NogMmy+8wWZMpn3HWc" crossorigin="anonymous"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              forcall: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              earth: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                500: '#a8a29e',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              }
            }
          }
        },
        safelist: [
          'bg-blue-100', 'bg-red-100', 'bg-green-100', 'bg-orange-100', 'bg-sky-100',
          'text-blue-900', 'text-red-900', 'text-green-900', 'text-orange-900', 'text-sky-900',
          'border-blue-300', 'border-red-300', 'border-green-300', 'border-orange-300', 'border-sky-300',
          'ring-orange-400'
        ]
      }
    </script>
    <style>
      body { background-color: #fafaf9; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

      .print-only { display: none !important; }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }

      @keyframes wave-in {
        0%   { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(4px); }
        60%  { opacity: 1; filter: blur(0); }
        100% { transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-wave-in {
        animation: wave-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes wave-child {
        0%   { opacity: 0; transform: translateY(20px) scale(0.97); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-stagger > * {
        animation: wave-child 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .animate-stagger > *:nth-child(1)  { animation-delay: 0.00s; }
      .animate-stagger > *:nth-child(2)  { animation-delay: 0.06s; }
      .animate-stagger > *:nth-child(3)  { animation-delay: 0.12s; }
      .animate-stagger > *:nth-child(4)  { animation-delay: 0.18s; }
      .animate-stagger > *:nth-child(5)  { animation-delay: 0.24s; }
      .animate-stagger > *:nth-child(6)  { animation-delay: 0.30s; }
      .animate-stagger > *:nth-child(7)  { animation-delay: 0.36s; }
      .animate-stagger > *:nth-child(8)  { animation-delay: 0.42s; }
      .animate-stagger > *:nth-child(9)  { animation-delay: 0.48s; }
      .animate-stagger > *:nth-child(10) { animation-delay: 0.54s; }
      .animate-stagger > *:nth-child(11) { animation-delay: 0.60s; }
      .animate-stagger > *:nth-child(12) { animation-delay: 0.66s; }
      .animate-stagger > *:nth-child(13) { animation-delay: 0.72s; }
      .animate-stagger > *:nth-child(14) { animation-delay: 0.78s; }
      .animate-stagger > *:nth-child(15) { animation-delay: 0.84s; }

      /* ── Wave backgrounds ── */
      .wave-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      /* Subtle: gentle gradient drift */
      @keyframes wave-drift {
        0%   { background-position: 0% 50%; }
        25%  { background-position: 100% 0%; }
        50%  { background-position: 100% 100%; }
        75%  { background-position: 0% 100%; }
        100% { background-position: 0% 50%; }
      }
      .wave-subtle .wave-layer {
        position: absolute;
        inset: -50%;
        background: linear-gradient(135deg, var(--wc1), var(--wc2), var(--wc3));
        background-size: 200% 200%;
        animation: wave-drift 25s ease-in-out infinite;
        opacity: 0.12;
        transition: opacity 0.6s;
      }
      .wave-subtle .wave-layer:nth-child(2) {
        background: linear-gradient(225deg, var(--wc3), var(--wc1), var(--wc2));
        background-size: 300% 300%;
        animation: wave-drift 35s ease-in-out infinite reverse;
        opacity: 0.08;
      }
      .wave-intensity-low .wave-layer { opacity: 0.06; }
      body.wave-intensity-low .wave-layer:nth-child(2) { opacity: 0.04; }
      .wave-intensity-high .wave-layer { opacity: 0.2; }
      body.wave-intensity-high .wave-layer:nth-child(2) { opacity: 0.15; }

      /* Dynamic: layered radial blobs */
      @keyframes wave-blob {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(8%, -6%) scale(1.05); }
        66%  { transform: translate(-5%, 4%) scale(0.95); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes wave-blob2 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(-7%, 5%) scale(1.08); }
        66%  { transform: translate(6%, -8%) scale(0.92); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes wave-blob3 {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(5%, 5%) scale(1.1); }
        100% { transform: translate(0, 0) scale(1); }
      }
      .wave-dynamic .wave-layer {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.1;
        transition: opacity 0.6s;
      }
      body.wave-intensity-low .wave-dynamic .wave-layer { opacity: 0.05; }
      body.wave-intensity-high .wave-dynamic .wave-layer { opacity: 0.18; }
      .wave-dynamic .wave-layer:nth-child(1) {
        width: 60%;
        height: 60%;
        top: -10%;
        left: -10%;
        background: var(--wc1);
        animation: wave-blob 18s ease-in-out infinite;
      }
      .wave-dynamic .wave-layer:nth-child(2) {
        width: 50%;
        height: 50%;
        bottom: -5%;
        right: -5%;
        background: var(--wc2);
        animation: wave-blob2 22s ease-in-out infinite;
      }
      .wave-dynamic .wave-layer:nth-child(3) {
        width: 40%;
        height: 40%;
        top: 40%;
        left: 30%;
        background: var(--wc3);
        animation: wave-blob3 15s ease-in-out infinite;
      }

      /* Radial: expanding circles */
      @keyframes wave-expand {
        0%   { transform: scale(1); opacity: 0.12; }
        50%  { transform: scale(1.3); opacity: 0.05; }
        100% { transform: scale(1); opacity: 0.12; }
      }
      @keyframes wave-expand2 {
        0%   { transform: scale(1); opacity: 0.08; }
        50%  { transform: scale(1.2); opacity: 0.03; }
        100% { transform: scale(1); opacity: 0.08; }
      }
      .wave-radial .wave-layer {
        position: absolute;
        border-radius: 50%;
        border: 2px solid;
        transition: all 0.6s;
      }
      body.wave-intensity-low .wave-radial .wave-layer { opacity: 0.04; }
      body.wave-intensity-high .wave-radial .wave-layer { opacity: 0.18; }
      .wave-radial .wave-layer:nth-child(1) {
        width: 80%;
        height: 80%;
        top: 10%;
        left: 10%;
        border-color: var(--wc1);
        animation: wave-expand 8s ease-in-out infinite;
      }
      .wave-radial .wave-layer:nth-child(2) {
        width: 60%;
        height: 60%;
        top: 20%;
        left: 20%;
        border-color: var(--wc2);
        animation: wave-expand2 6s ease-in-out infinite reverse;
      }
      .wave-radial .wave-layer:nth-child(3) {
        width: 95%;
        height: 95%;
        top: 2.5%;
        left: 2.5%;
        border-color: var(--wc3);
        animation: wave-expand 10s ease-in-out infinite 2s;
      }

      /* Particles: floating dots */
      @keyframes wave-float1 {
        0%   { transform: translateY(0) translateX(0); opacity: 0; }
        10%  { opacity: 0.5; }
        90%  { opacity: 0.5; }
        100% { transform: translateY(-100vh) translateX(20vw); opacity: 0; }
      }
      @keyframes wave-float2 {
        0%   { transform: translateY(0) translateX(0); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(-100vh) translateX(-15vw); opacity: 0; }
      }
      .wave-particles .wave-layer {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .wave-particles .wave-layer:nth-child(1) {
        width: 6px; height: 6px;
        bottom: -10%;
        left: 20%;
        background: var(--wc1);
        animation: wave-float1 12s ease-in-out infinite;
      }
      .wave-particles .wave-layer:nth-child(2) {
        width: 4px; height: 4px;
        bottom: -10%;
        left: 50%;
        background: var(--wc2);
        animation: wave-float2 16s ease-in-out infinite 2s;
      }
      .wave-particles .wave-layer:nth-child(3) {
        width: 8px; height: 8px;
        bottom: -10%;
        left: 75%;
        background: var(--wc3);
        animation: wave-float1 14s ease-in-out infinite 4s;
      }
      .wave-particles .wave-layer:nth-child(4) {
        width: 5px; height: 5px;
        bottom: -10%;
        left: 35%;
        background: var(--wc1);
        animation: wave-float2 18s ease-in-out infinite 6s;
      }
      .wave-particles .wave-layer:nth-child(5) {
        width: 7px; height: 7px;
        bottom: -10%;
        left: 60%;
        background: var(--wc3);
        animation: wave-float1 20s ease-in-out infinite 3s;
      }

@media print {
         .no-print,
         header,
         nav,
         button,
         .fixed,
         .absolute,
         input,
         select,
         textarea,
         [role="dialog"],
         .print-hide {
           display: none !important;
         }

         .print-only {
           display: block !important;
         }

         /* Show events in calendar cells during print */
         #calendar-container button {
           display: flex !important;
         }

         body {
           background-color: white !important;
           color: black !important;
           margin: 0 !important;
           padding: 0 !important;
           width: 100% !important;
         }

         /* Forzar que el calendario ocupe una sola hoja */
         #calendar-container {
           width: 100% !important;
           max-height: 190mm !important; /* Ajuste para A4 Landscape */
           padding: 0 !important;
           margin: 0 !important;
           overflow: hidden !important;
           page-break-inside: avoid !important;
         }

         /* Reducción de tamaños para impresión */
         .grid-cols-7 {
           gap: 2px !important;
         }

         .min-h-\[140px\], .md\:min-h-\[160px\] {
           min-height: 80px !important; /* Reducir altura para que quepan 6 filas */
         }

         .text-lg { font-size: 1rem !important; }
         .text-\[9px\] { font-size: 8px !important; }

         /* Mejoras para tabla de lista al imprimir */
         table {
           width: 100% !important;
           font-size: 9px !important;
         }
         th, td {
           padding: 4px 6px !important;
           border-color: #ccc !important;
         }
         th {
           background-color: #eee !important;
           -webkit-print-color-adjust: exact;
           print-color-adjust: exact;
         }

         * {
           -webkit-print-color-adjust: exact !important;
           print-color-adjust: exact !important;
         }

         @page {
           size: A4 landscape;
           margin: 5mm;
         }
       }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
