
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="2.0.1" />
    <title>Gestión Salud Forcall</title>
    <script src="https://cdn.tailwindcss.com" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Librería para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha384-Yv5O+t3uE3hunW8uyrbpPW3iw6/5/Y7HitWJBLgqfMoA36NogMmy+8wWZMpn3HWc" crossorigin="anonymous"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              forcall: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              earth: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                500: '#a8a29e',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              }
            }
          }
        },
        safelist: [
          'bg-blue-100', 'bg-red-100', 'bg-green-100', 'bg-orange-100', 'bg-sky-100',
          'text-blue-900', 'text-red-900', 'text-green-900', 'text-orange-900', 'text-sky-900',
          'border-blue-300', 'border-red-300', 'border-green-300', 'border-orange-300', 'border-sky-300',
          'ring-orange-400'
        ]
      }
    </script>
    <style>
      body { background-color: #fafaf9; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
      
      .print-only { display: none !important; }

      @media print {
        .no-print, 
        header, 
        nav, 
        button, 
        .fixed, 
        .absolute,
        input,
        select,
        textarea,
        [role="dialog"] { 
          display: none !important; 
        }

        .print-only { 
          display: block !important; 
        }

        body { 
          background-color: white !important; 
          color: black !important; 
          margin: 0 !important; 
          padding: 0 !important;
          width: 100% !important;
        }

        /* Forzar que el calendario ocupe una sola hoja */
        #calendar-container {
          width: 100% !important;
          max-height: 190mm !important; /* Ajuste para A4 Landscape */
          padding: 0 !important;
          margin: 0 !important;
          overflow: hidden !important;
          page-break-inside: avoid !important;
        }

        /* Reducción de tamaños para impresión */
        .grid-cols-7 {
          gap: 2px !important;
        }

        .min-h-\[140px\], .md\:min-h-\[160px\] {
          min-height: 80px !important; /* Reducir altura para que quepan 6 filas */
        }

        .text-lg { font-size: 1rem !important; }
        .text-\[9px\] { font-size: 8px !important; }

        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        @page {
          size: A4 landscape;
          margin: 5mm;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
